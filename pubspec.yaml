name: noteit
description: "A simple app for taking notes and organizing ideas."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

#  Drift dependencies
  drift: ^2.32.1
  drift_flutter: ^0.3.0

#  Riverpod dependencies
  flutter_riverpod: ^3.3.1
#  riverpod_annotation: ^2.6.1
  analysis_server_plugin: ^0.3.7

#  Firebase dependencies
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0

#  Navigation dependencies
  go_router: ^17.2.2
  riverpod_annotation: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.8
  drift_dev: ^2.22.0
  flutter_launcher_icons: ^0.14.4


flutter:
  uses-material-design: true
  assets:
    - assets/
